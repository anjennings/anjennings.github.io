<div class="projects">
	<p class="intro">
		My Active Github Repos:
	</p>
	<div *ngFor="let repo of gitRepos" id="loop">
		<div id="gitRepo">
		<a href={{repo.url}}>
			<h1 id="repoName">{{repo.name}}</h1>
			<h2 id="repoLang">Main Language: {{repo.mainLang}}</h2>
			<!--<h3 id="repoLicense">License: {{repo.license}}</h3>-->
			<h3 id="repoUpdate">Last Updated: {{repo.updated}}</h3>
		</a>
		</div>
	</div>
</div>
